<!DOCTYPE html>
<html lang="en">
    <head>
        <meta http-equiv="Content-Type" content="text/html;charset=UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Aurora | Contact Us</title>
        <link rel="stylesheet" href="styles.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
        <link rel="shortcut icon" href="images/logo.png" type="image/x-icon">
        <style>
            body {
                font-size: 20px;
            }

            section {
                display: grid;
                grid-template-rows: 50vh 50vh;
                grid-template-columns: 5vw 90vw 5vw;
            }

            form {
                grid-row: auto;
                grid-column: auto;
                border: 2px #000 solid;
                border-radius: 10px;
                padding: 50px;
            }

            #formHeader {
                font-size: 36px;
            }

            .requiredSpan {
                font-weight: 900;
                font-size: 24px;
                color: #ff0000;
            }

            #messageArea {
                min-height: 50px;
                min-width: 100px;
                max-width: 100px;
            }

            #honeypot {
                display: none;
            }
        </style>
    </head>
    <body>
        <header>
            <a class="logoContainer" href="index.html">
                <img src="images/logo.png" alt="logo" class="logo">
                <h1>Aurora Coffee Roasters</h1>
            </a>
            <div class="centeringDiv">
                <div class="navLinks">
                    <a href="index.html">Home</a>
                    <a href="products.html">Products</a>
                    <a href="contact.html" class="contactButton">Contact Us</a>
                </div>
            </div>
        </header>
        <section>
            <form action="contactresult.html" method="post">
                <h2 id="formHeader">
                    Contact Form
                </h2>
                <div>
                    <label for="message">Full Name:</label><span class="requiredSpan">*</span>
                    <input type="text" name="message" required>
                </div>
                <div>
                    <label for="message">eMail:</label><span class="requiredSpan">*</span>
                    <input type="email" name="message" required>
                </div>
                <div>
                    <label for="message">Phone #:</label>
                    <input type="text" name="message">
                </div>
                <div>
                    <label for="message">Address:</label>
                    <input type="text" name="message">
                </div>
                <div id="honeypot">
                    <label for="message">Social Security Number:</label><span class="requiredSpan">*</span>
                    <input type="text" name="message">
                </div>
                <div>
                    <label for="message">Message:</label><span class="requiredSpan">*</span>
                    <textarea name="message" id="messageArea" required></textarea>
                </div>
            </form>
        </section>
    </body>
</html>
